---
name: "CI"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-fmt:
    name: 🧹 Format Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🛠️ Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt,clippy

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🧹 Format check
        run: cargo fmt --all --check

  rust-ci:
    name: 🦀 Feature Matrix
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🛠️ Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🏗️ Build
        run: bash scripts/check-build-matrix.sh build

      - name: 🔍 Clippy lint
        run: bash scripts/check-build-matrix.sh clippy

      - name: 🧪 Run tests
        run: bash scripts/check-build-matrix.sh test
