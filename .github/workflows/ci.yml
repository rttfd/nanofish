name: "CI"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fmt:
    name: 🧹 Format check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🛠️ Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.89
          components: rustfmt
      - name: 🧹 Format check
        run: cargo fmt --all --check

  clippy:
    name: 🔍 Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "default"
            features: ""
            cache_key: "default"
          - name: "tls"
            features: "tls"
            cache_key: "tls"
          - name: "log"
            features: "log"
            cache_key: "log"
          - name: "defmt"
            features: "defmt"
            cache_key: "defmt"
          - name: "tls+log"
            features: "tls,log"
            cache_key: "tls-log"
          - name: "tls+defmt"
            features: "tls,defmt"
            cache_key: "tls-defmt"
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🛠️ Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.89
          components: clippy
      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ matrix.cache_key }}-${{ hashFiles('**/Cargo.lock') }}
      - name: 🔍 Clippy lint
        run: cargo clippy --features "${{ matrix.features }}" -- -D warnings -W clippy::pedantic

  test:
    name: 🧪 Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "default"
            features: ""
            cache_key: "default"
          - name: "tls"
            features: "tls"
            cache_key: "tls"
          - name: "log"
            features: "log"
            cache_key: "log"
          - name: "defmt"
            features: "defmt"
            cache_key: "defmt"
          - name: "tls+log"
            features: "tls,log"
            cache_key: "tls-log"
          - name: "tls+defmt"
            features: "tls,defmt"
            cache_key: "tls-defmt"
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🛠️ Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.89
      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ matrix.cache_key }}-${{ hashFiles('**/Cargo.lock') }}
      - name: 🧪 Run tests
        run: cargo test --features "${{ matrix.features }}"