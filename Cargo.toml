[package]
name = "nanofish"
version = "0.9.1"
edition = "2024"
description = "🐟 A lightweight, `no_std` HTTP client and server for embedded systems built on top of Embassy networking."
documentation = "https://docs.rs/nanofish"
repository = "https://github.com/rttfd/nanofish"
license = "MIT"
keywords = ["no_std", "embedded", "async", "http_client", "http_server"]
authors = ["rttf <contact@rttf.dev>"]

[features]
default = []
tls = ["dep:embedded-tls", "dep:rand_core", "dep:rand_chacha"]
defmt = ["dep:defmt", "embassy-net/defmt"]
log = ["dep:log"]

[dependencies]
defmt = { version = "1.0.1", optional = true }
embassy-net = { version = "0.7.1", features = [
    "dns",
    "medium-ethernet",
    "proto-ipv6",
    "tcp",
] }
embassy-time = "0.5.0"
embedded-io-async = "0.6.1"
embedded-tls = { version = "0.17.0", default-features = false, optional = true }
heapless = "0.9.1"
log = { version = "0.4", optional = true }
rand_chacha = { version = "0.3", default-features = false, optional = true }
rand_core = { version = "0.6.4", optional = true }

[dev-dependencies]
futures-lite = "2.0"
